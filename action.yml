name: 'Create Deployment Matrix'
description: 'Creates a matrix for service deployment by combining services from .skyhook/skyhook.yaml and/or .koala-monorepo.json configurations'
author: 'Skyhook'

branding:
  icon: 'grid'
  color: 'purple'

inputs:
  overlay:
    description: 'The overlay/environment to use for kustomize (e.g., dev, staging, production). If not provided, all environments will be included.'
    required: false
  branch:
    description: 'The branch to use for deployment'
    required: false
    default: 'main'
  tag:
    description: 'The image tag to deploy'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
  repo-path:
    description: 'The path to the repo'
    required: false
    default: '.'
  infra-repo-path:
    description: 'Path to checked-out infra repo containing environment definitions (for Skyhook)'
    required: false
  environments-path:
    description: 'Path to environments directory within infra repo (for Skyhook)'
    required: false
    default: 'skyhook/environments'
  deploy-tool-filter:
    description: 'Filter by deploy tool: kubectl, argocd, or all (default). Only applies to Skyhook config.'
    required: false
    default: 'all'

outputs:
  matrix:
    description: 'JSON string of the deployment matrix for service deployments'
  config-format:
    description: 'The configuration format(s) that were detected (comma-separated: skyhook,koala)'

runs:
  using: 'node20'
  main: 'dist/index.js'
